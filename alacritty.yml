selection:
  semantic_escape_chars: ",│`|:\"' ()[]{}<>"

  # When set to `true`, selected text will be copied to both the primary and
  # the selection clipboard. Otherwise, it will only be copied to the selection
  # clipboard.
  save_to_clipboard: true

live_config_reload: true

mouse_bindings:
  - { mouse: Middle, action: PasteSelection }

mouse:
  # Click settings
  #
  # The `double_click` and `triple_click` settings control the time
  # alacritty should wait for accepting multiple clicks as one double
  # or triple click.
  double_click: { threshold: 300 }
  triple_click: { threshold: 300 }

  # If this is `true`, the cursor is temporarily hidden when typing.
  hide_when_typing: true


window:
  # Window dimensions in character columns and lines
  # (changes require restart)
  dimensions:
    columns: 160
    lines: 48

  # Adds this many blank pixels of padding around the window
  # Units are physical pixels; this is not DPI aware.
  # (change requires restart)
  padding:
    x: 2
    y: 2

  # Spread additional padding evenly around the terminal content.
  dynamic_padding: false

  dynamic_title: true


  # Window decorations
  # Setting this to false will result in window without borders and title bar.
  decorations: full


draw_bold_text_with_bright_colors: true
 
font:
  # The normal (roman) font face to use.
  normal:
    family: MonoLisa
    style: Regular

  # The bold font face
  bold:
    family: MonoLisa
    style: Bold

  # The italic font face
  italic:
    family: Jetbrains Mono
    style: Regular Italic

  # Point size of the font
  size: 14.0

  # Offset is the extra space around each character. offset.y can be thought of
  # as modifying the linespacing, and offset.x as modifying the letter spacing.
  offset:
    x: 0
    y: 0

  # Glyph offset determines the locations of the glyphs within their cells with
  # the default being at the bottom. Increase the x offset to move the glyph to
  # the right, increase the y offset to move the glyph upward.
  glyph_offset:
    x: 0
    y: 0

  # OS X only: use thin stroke font rendering. Thin strokes are suitable
  # for retina displays, but for non-retina you probably want this set to
  # false.
  use_thin_strokes: true


# Colors (Nord)
colors:
  # Default colors
  primary:
    background: '0x2E3440'
    foreground: '0xD8DEE9'

  # Normal colors
  normal:
    black:   '0x3B4252'
    red:     '0xBF616A'
    green:   '0xA3BE8C'
    yellow:  '0xEBCB8B'
    blue:    '0x81A1C1'
    magenta: '0xB48EAD'
    cyan:    '0x88C0D0'
    white:   '0xE5E9F0'

  # Bright colors
  bright:
    black:   '0x4C566A'
    red:     '0xBF616A'
    green:   '0xA3BE8C'
    yellow:  '0xEBCB8B'
    blue:    '0x81A1C1'
    magenta: '0xB48EAD'
    cyan:    '0x8FBCBB'
    white:   '0xECEFF4'

shell:
  program: /usr/local/bin/tmux
  args:
    - new-session
    - -A
    - -D
    - -s
    - main

scrolling:
  # Maximum number of lines in the scrollback buffer.
  # Specifying '0' will disable scrolling.
  history: 10000

  # Number of lines the viewport will move for every line scrolled when
  # scrollback is enabled (history > 0).
  multiplier: 3

bell:
  animation: EaseOutExpo
  duration: 0  

cursor:
  # Cursor style
  #
  # Values for 'style':
  #   - ▇ Block
  #   - _ Underline
  #   - | Beam
  style: Block
  unfocused_hollow: false    


key_bindings:
  - { key: V,        mods: Command, action: Paste                        }
  - { key: C,        mods: Command, action: Copy                         }
  - { key: Q,        mods: Command, action: Quit                         }
  - { key: N,        mods: Command, command: { program: "open", args: ["-nb", "io.alacritty"] } }    
  - { key: D,        mods: Command,       chars: "\x06\x76" } 
  - { key: D,        mods: Command|Shift, chars: "\x06\x73" }
  - { key: W,        mods: Command,       chars: "\x06\x78" }
  - { key: H,        mods: Command,       chars: "\x06\x68" }
  - { key: J,        mods: Command,       chars: "\x06\x6a" }
  - { key: K,        mods: Command,       chars: "\x06\x6b" }
  - { key: L,        mods: Command,       chars: "\x06\x6c" }
  - { key: T,        mods: Command,       chars: "\x06\x63" }
  - { key: Key1,     mods: Command,       chars: "\x06\x31" }
  - { key: Key2,     mods: Command,       chars: "\x06\x32" }
  - { key: Key3,     mods: Command,       chars: "\x06\x33" }
  - { key: Key4,     mods: Command,       chars: "\x06\x34" }
  - { key: Key5,     mods: Command,       chars: "\x06\x35" }
  - { key: Key6,     mods: Command,       chars: "\x06\x36" }
  - { key: Key7,     mods: Command,       chars: "\x06\x37" }
  - { key: Key8,     mods: Command,       chars: "\x06\x38" }
  - { key: Key9,     mods: Command,       chars: "\x06\x39" }
